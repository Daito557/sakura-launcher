name: Build Sakura Launcher (Windows / macOS / Linux)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            name: windows
          - os: macos-latest
            name: macos
          - os: ubuntu-latest
            name: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      # ── Build launcher principal ──────────────────────────────────────────
      - name: Build Windows (normal)
        if: matrix.name == 'windows'
        run: pyinstaller --noconfirm --onefile --windowed --noupx --name SakuraLauncher --icon icon.ico --add-data "icon.png;." --add-data "background.jpg;." --distpath dist sakura.py

      - name: Build macOS (normal)
        if: matrix.name == 'macos'
        run: pyinstaller --noconfirm --windowed --name SakuraLauncher --icon icon.icns --add-data "icon.png:." --add-data "background.jpg:." --distpath dist sakura.py

      - name: Build Linux (normal)
        if: matrix.name == 'linux'
        run: pyinstaller --noconfirm --onedir --name SakuraLauncher --icon icon.png --add-data "icon.png:." --add-data "background.jpg:." --distpath dist sakura.py

      # ── Build version Low PC ──────────────────────────────────────────────
      - name: Build Windows (LowPC)
        if: matrix.name == 'windows'
        run: pyinstaller --noconfirm --onefile --windowed --noupx --name SakuraLauncher-LowPC --icon icon.ico --add-data "icon.png;." --distpath dist "sakura_low pc.py"

      - name: Build macOS (LowPC)
        if: matrix.name == 'macos'
        run: pyinstaller --noconfirm --windowed --name SakuraLauncher-LowPC --icon icon.icns --add-data "icon.png:." --distpath dist "sakura_low pc.py"

      - name: Build Linux (LowPC)
        if: matrix.name == 'linux'
        run: pyinstaller --noconfirm --onedir --name SakuraLauncher-LowPC --icon icon.png --add-data "icon.png:." --distpath dist "sakura_low pc.py"

      # ── Zip Windows ───────────────────────────────────────────────────────
      - name: Zip (Windows)
        if: matrix.name == 'windows'
        run: |
          Compress-Archive -Path dist\SakuraLauncher.exe -DestinationPath SakuraLauncher-windows.zip -Force
          Compress-Archive -Path dist\SakuraLauncher-LowPC.exe -DestinationPath SakuraLauncher-LowPC-windows.zip -Force

      # ── Zip macOS ─────────────────────────────────────────────────────────
      - name: Zip (macOS)
        if: matrix.name == 'macos'
        run: |
          (cd dist && zip -r ../SakuraLauncher-macos.zip SakuraLauncher.app)
          (cd dist && zip -r ../SakuraLauncher-LowPC-macos.zip SakuraLauncher-LowPC.app)

      # ── Zip Linux ─────────────────────────────────────────────────────────
      - name: Zip (Linux)
        if: matrix.name == 'linux'
        run: |
          (cd dist && zip -r ../SakuraLauncher-linux.zip SakuraLauncher)
          (cd dist && zip -r ../SakuraLauncher-LowPC-linux.zip SakuraLauncher-LowPC)

      # ── Paquet .deb (Linux seulement) ─────────────────────────────────────
      - name: Build .deb (Linux)
        if: matrix.name == 'linux'
        run: |
          PKG=sakura-launcher_amd64
          mkdir -p $PKG/DEBIAN
          mkdir -p $PKG/usr/lib/sakura-launcher
          mkdir -p $PKG/usr/bin
          mkdir -p $PKG/usr/share/applications
          mkdir -p $PKG/usr/share/icons/hicolor/256x256/apps

          # Copier le dossier onedir
          cp -r dist/SakuraLauncher/* $PKG/usr/lib/sakura-launcher/

          # Icône
          cp icon.png $PKG/usr/share/icons/hicolor/256x256/apps/sakura-launcher.png

          # Lanceur shell
          cat > $PKG/usr/bin/sakura-launcher << 'SHELL'
          #!/bin/sh
          exec /usr/lib/sakura-launcher/SakuraLauncher "$@"
          SHELL
          chmod +x $PKG/usr/bin/sakura-launcher

          # Entrée .desktop
          cat > $PKG/usr/share/applications/sakura-launcher.desktop << 'DESKTOP'
          [Desktop Entry]
          Name=Sakura Launcher
          Comment=Lanceur Minecraft Sakura
          Exec=/usr/lib/sakura-launcher/SakuraLauncher
          Icon=sakura-launcher
          Terminal=false
          Type=Application
          Categories=Game;
          DESKTOP

          # Fichier de contrôle deb
          cat > $PKG/DEBIAN/control << 'CONTROL'
          Package: sakura-launcher
          Version: 2.1.5
          Architecture: amd64
          Maintainer: Sakura <boisniert455@gmail.com>
          Description: Sakura Minecraft Launcher
           Lanceur Minecraft personnalisé avec interface Sakura.
          Depends: libgtk-3-0, libglib2.0-0
          CONTROL

          dpkg-deb --build $PKG SakuraLauncher-linux.deb

      - name: Upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: SakuraLauncher-${{ matrix.name }}
          path: |
            SakuraLauncher-${{ matrix.name }}.zip
            SakuraLauncher-LowPC-${{ matrix.name }}.zip
            SakuraLauncher-linux.deb

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Télécharger tous les builds
        uses: actions/download-artifact@v4
        with:
          pattern: SakuraLauncher-*
          path: release-files
          merge-multiple: true

      - name: Publier la Release GitHub
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-files/*.zip
            release-files/*.deb
          generate_release_notes: true
