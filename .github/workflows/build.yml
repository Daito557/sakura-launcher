name: Build Sakura Launcher (Windows / macOS / Linux)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            name: windows
          - os: macos-latest
            name: macos
          - os: ubuntu-latest
            name: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      # ── Build launcher principal ──────────────────────────────────────────
      - name: Build Windows (normal)
        if: matrix.name == 'windows'
        run: pyinstaller --noconfirm --onefile --windowed --noupx --name SakuraLauncher --icon icon.ico --add-data "icon.png;." --distpath dist sakura.py

      - name: Build macOS (normal)
        if: matrix.name == 'macos'
        run: pyinstaller --noconfirm --windowed --name SakuraLauncher --icon icon.icns --add-data "icon.png:." --distpath dist sakura.py

      - name: Build Linux (normal)
        if: matrix.name == 'linux'
        run: pyinstaller --noconfirm --onedir --name SakuraLauncher --icon icon.png --add-data "icon.png:." --distpath dist sakura.py

      # ── Build version Low PC ──────────────────────────────────────────────
      - name: Build Windows (LowPC)
        if: matrix.name == 'windows'
        run: pyinstaller --noconfirm --onefile --windowed --noupx --name SakuraLauncher-LowPC --icon icon.ico --add-data "icon.png;." --distpath dist "sakura_low pc.py"

      - name: Build macOS (LowPC)
        if: matrix.name == 'macos'
        run: pyinstaller --noconfirm --windowed --name SakuraLauncher-LowPC --icon icon.icns --add-data "icon.png:." --distpath dist "sakura_low pc.py"

      - name: Build Linux (LowPC)
        if: matrix.name == 'linux'
        run: pyinstaller --noconfirm --onedir --name SakuraLauncher-LowPC --icon icon.png --add-data "icon.png:." --distpath dist "sakura_low pc.py"

      # ── Zip Windows ───────────────────────────────────────────────────────
      - name: Zip (Windows)
        if: matrix.name == 'windows'
        run: |
          Compress-Archive -Path dist\SakuraLauncher.exe -DestinationPath SakuraLauncher-windows.zip
          Compress-Archive -Path dist\SakuraLauncher-LowPC.exe -DestinationPath SakuraLauncher-LowPC-windows.zip

      # ── Zip macOS ─────────────────────────────────────────────────────────
      - name: Zip (macOS)
        if: matrix.name == 'macos'
        run: |
          cd dist && zip -r ../SakuraLauncher-macos.zip SakuraLauncher.app
          cd dist && zip -r ../SakuraLauncher-LowPC-macos.zip SakuraLauncher-LowPC.app

      # ── Zip Linux ─────────────────────────────────────────────────────────
      - name: Zip (Linux)
        if: matrix.name == 'linux'
        run: |
          cd dist && zip -r ../SakuraLauncher-linux.zip SakuraLauncher
          cd dist && zip -r ../SakuraLauncher-LowPC-linux.zip SakuraLauncher-LowPC

      - name: Upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: SakuraLauncher-${{ matrix.name }}
          path: |
            SakuraLauncher-${{ matrix.name }}.zip
            SakuraLauncher-LowPC-${{ matrix.name }}.zip

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Télécharger tous les builds
        uses: actions/download-artifact@v4
        with:
          pattern: SakuraLauncher-*
          path: release-files
          merge-multiple: true

      - name: Publier la Release GitHub
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*.zip
          generate_release_notes: true
