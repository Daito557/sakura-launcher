name: Build Sakura Launcher (Windows / macOS / Linux)

# Se déclenche sur chaque push de tag de version (ex: v2.1.0) ou manuellement
# depuis l'onglet Actions de GitHub. Compile sur les 3 OS en parallèle via
# des vraies machines Windows/macOS/Linux fournies par GitHub — pas besoin
# de posséder un Mac pour obtenir un .app/.dmg.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            name: windows
          - os: macos-latest
            name: macos
          - os: ubuntu-latest
            name: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances
        run: |
          pip install -r requirements.txt

      - name: Build Windows
        if: matrix.name == 'windows'
        # --onefile : un seul .exe autonome (plus simple à distribuer, mais
        # plus susceptible d'être flaggé par Windows Defender que --onedir)
        run: |
          pyinstaller --noconfirm --onefile --windowed --noupx --name SakuraLauncher --icon icon.ico --add-data "icon.png;." --distpath dist sakura.py

      - name: Build macOS
        if: matrix.name == 'macos'
        run: |
          pyinstaller --noconfirm --windowed --name SakuraLauncher --icon icon.icns --add-data "icon.png:." --distpath dist sakura.py

      - name: Build Linux
        if: matrix.name == 'linux'
        run: |
          pyinstaller --noconfirm --onedir --name SakuraLauncher --icon icon.png --add-data "icon.png:." --distpath dist sakura.py

      # Zippe le build en un seul fichier par OS, pour un lien de
      # téléchargement direct simple dans la Release GitHub (pas un dossier
      # à explorer comme avec les artifacts).
      - name: Zip (Windows)
        if: matrix.name == 'windows'
        run: Compress-Archive -Path dist\SakuraLauncher.exe -DestinationPath SakuraLauncher-windows.zip

      - name: Zip (macOS)
        if: matrix.name == 'macos'
        run: cd dist && zip -r ../SakuraLauncher-macos.zip SakuraLauncher.app

      - name: Zip (Linux)
        if: matrix.name == 'linux'
        run: cd dist && zip -r ../SakuraLauncher-linux.zip SakuraLauncher

      - name: Upload artefact
        uses: actions/upload-artifact@v4
        with:
          name: SakuraLauncher-${{ matrix.name }}
          path: SakuraLauncher-${{ matrix.name }}.zip

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Télécharger tous les builds
        uses: actions/download-artifact@v4
        with:
          pattern: SakuraLauncher-*
          path: release-files
          merge-multiple: true

      - name: Publier la Release GitHub
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*.zip
          generate_release_notes: true
